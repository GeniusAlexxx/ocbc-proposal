<svg xmlns="http://www.w3.org/2000/svg" width="900" height="1600" viewBox="0 0 900 1600" role="img" aria-labelledby="title desc">
  <title id="title">Figure 4 - Financial Wellness Dashboard</title>
  <desc id="desc">Mobile app dashboard with health score, savings progress, and personalized tips.</desc>
  <defs>
